<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Talk to Abhijeet's AI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --accent: #7c6dfa;
      --accent2: #e05cff;
      --text: #f0eeff;
      --muted: #8b89a0;
      --glow: rgba(124, 109, 250, 0.35);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(124,109,250,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(224,92,255,0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 90%;
      background: var(--surface);
      border: 1px solid rgba(124,109,250,0.2);
      border-radius: 24px;
      box-shadow: 0 0 60px rgba(124,109,250,0.1), 0 2px 40px rgba(0,0,0,0.4);
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar-ring {
      width: 80px; height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      box-shadow: 0 0 30px var(--glow);
      animation: pulse-ring 3s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 30px var(--glow); }
      50%       { box-shadow: 0 0 55px rgba(124,109,250,0.55); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.55rem; font-weight: 800;
      letter-spacing: -0.02em; margin-bottom: 0.5rem;
      background: linear-gradient(90deg, var(--text) 30%, var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p { color: var(--muted); font-size: 0.92rem; line-height: 1.6; margin-bottom: 2rem; }

    #vapi-btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      padding: 0.85rem 2rem; border-radius: 50px; border: none;
      cursor: pointer; font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      box-shadow: 0 4px 24px var(--glow);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    #vapi-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 36px var(--glow); }
    #vapi-btn:active { transform: translateY(0); }
    #vapi-btn.active {
      background: linear-gradient(135deg, #e05cff 0%, #7c6dfa 100%);
      animation: btn-pulse 1.2s ease-in-out infinite;
    }

    @keyframes btn-pulse {
      0%, 100% { box-shadow: 0 4px 24px var(--glow); }
      50%       { box-shadow: 0 4px 48px rgba(224,92,255,0.55); }
    }

    #vapi-btn .mic-icon {
      width: 20px; height: 20px;
      fill: none; stroke: #fff; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
    }

    #status {
      display: block; margin-top: 1.2rem;
      font-size: 0.8rem; color: var(--muted);
      letter-spacing: 0.04em; min-height: 1.2em; transition: color 0.3s;
    }
    #status.live  { color: #a78bff; }
    #status.error { color: #ff6b6b; }

    .wave { display: none; gap: 4px; align-items: flex-end; justify-content: center; height: 24px; margin-top: 1rem; }
    .wave.visible { display: flex; }
    .wave span {
      display: block; width: 4px; border-radius: 2px;
      background: linear-gradient(to top, var(--accent), var(--accent2));
      animation: bar 0.9s ease-in-out infinite;
    }
    .wave span:nth-child(1) { height: 8px;  animation-delay: 0s; }
    .wave span:nth-child(2) { height: 16px; animation-delay: 0.15s; }
    .wave span:nth-child(3) { height: 22px; animation-delay: 0.3s; }
    .wave span:nth-child(4) { height: 16px; animation-delay: 0.45s; }
    .wave span:nth-child(5) { height: 8px;  animation-delay: 0.6s; }

    @keyframes bar {
      0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
      50%       { transform: scaleY(1);   opacity: 1; }
    }

    .footer-note { margin-top: 2rem; font-size: 0.73rem; color: rgba(139,137,160,0.5); }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar-ring">🤖</div>
    <h1>Chat with Abhijeet's AI</h1>
    <p>Ask me anything about Abhijeet's projects,<br>skills, or experience — just click and speak.</p>

    <button id="vapi-btn" onclick="toggleCall()">
      <svg class="mic-icon" viewBox="0 0 24 24">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8"  y1="23" x2="16" y2="23"/>
      </svg>
      <span id="btn-label">Start Conversation</span>
    </button>

    <div class="wave" id="wave">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <span id="status">Loading SDK...</span>
    <p class="footer-note">Powered by Vapi AI · Built by Abhijeet</p>
  </div>

  <!-- ✅ Correct UMD bundle — exposes Vapi as a global class -->
  <script src="https://cdn.jsdelivr.net/gh/balacodeio/Vapi-Web-UMD@latest/dist/latest/vapi-web-bundle.min.js"></script>

  <script>
    var VAPI_PUBLIC_KEY = "701c97bc-a3c4-4aef-bd98-1ddf2682386e";
    var ASSISTANT_ID    = "48924dff-3df4-4c1c-8588-a13a6ba2dea6";

    var vapi = null;
    var callActive = false;

    function setStatus(msg, cls) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = cls || '';
    }

    window.addEventListener('load', function () {
      try {
        if (typeof Vapi === 'undefined') {
          setStatus('SDK failed to load. Please refresh.', 'error');
          return;
        }
        vapi = new Vapi(VAPI_PUBLIC_KEY);
        setStatus('Ready — click to begin');

        vapi.on('call-start', function () { setActive(true); });
        vapi.on('call-end',   function () { setActive(false); });
        vapi.on('error', function (e) {
          console.error('Vapi error:', e);
          setActive(false);
          setStatus('Something went wrong. Try again.', 'error');
        });
      } catch(err) {
        console.error(err);
        setStatus('Error: ' + err.message, 'error');
      }
    });

    function toggleCall() {
      if (!vapi) { setStatus('Still loading, please wait…', 'error'); return; }
      if (callActive) {
        vapi.stop();
      } else {
        setStatus('Connecting…');
        vapi.start(ASSISTANT_ID);
      }
    }

    function setActive(active) {
      callActive = active;
      var btn   = document.getElementById('vapi-btn');
      var label = document.getElementById('btn-label');
      var wave  = document.getElementById('wave');

      if (active) {
        btn.classList.add('active');
        label.textContent = 'End Call';
        wave.classList.add('visible');
        setStatus('Listening…', 'live');
      } else {
        btn.classList.remove('active');
        label.textContent = 'Start Conversation';
        wave.classList.remove('visible');
        setStatus('Ready — click to begin');
      }
    }
  </script>
</body>
</html>
