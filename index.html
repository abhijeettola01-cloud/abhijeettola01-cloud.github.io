<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abhijeet – VAPI Voice Bot Test</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            text-align: center;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        #startBotBtn {
            padding: 14px 28px;
            font-size: 18px;
            background: #0078ff;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }
        #startBotBtn:hover {
            background: #005fcc;
        }
    </style>
</head>

<body>

    <h1>🎤 VAPI Voice Bot</h1>
    <p>Click the button below to start the bot.</p>

    <!-- Start Button -->
    <button id="startBotBtn">Start Voice Bot</button>

    <!-- Load VAPI SDK -->
    <script src="https://cdn.vapi.ai/vapi.js"></script>

    <script>
        const assistantId = "48924dff-3df4-4c1c-8588-a13a6ba2dea6";

        // Wait for VAPI SDK
        window.vapi.onReady(() => {
            console.log("VAPI SDK Loaded");

            // Button click starts the bot
            document.getElementById("startBotBtn").onclick = () => {
                window.vapi.start({
                    assistantId: assistantId,
                    startMuted: false // Bot speaks immediately
                });
            };
        });
    </script>

</body>
</html>
